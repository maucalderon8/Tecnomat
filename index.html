<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Descargando PDF…</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #0f0f11;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #18181c;
      border: 1px solid #2a2a30;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      box-shadow: 0 0 60px rgba(0,0,0,0.6);
    }

    .icon {
      font-size: 48px;
      margin-bottom: 20px;
      display: block;
      animation: bounce 1.2s ease infinite alternate;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-8px); }
    }

    h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }

    .filename {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: #888;
      background: #111114;
      border: 1px solid #222228;
      border-radius: 8px;
      padding: 8px 14px;
      margin: 16px 0;
      word-break: break-all;
    }

    .status {
      font-size: 13px;
      color: #aaa;
      margin-top: 8px;
      min-height: 20px;
    }

    .bar-wrap {
      background: #111114;
      border-radius: 99px;
      height: 4px;
      margin-top: 20px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #4f8ef7, #a78bfa);
      width: 0%;
      transition: width 0.6s ease;
    }

    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 10px 24px;
      background: linear-gradient(90deg, #4f8ef7, #a78bfa);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
    }

    .note {
      font-size: 11px;
      color: #555;
      margin-top: 16px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
<div class="card">
  <span class="icon">📄</span>
  <h1>Descarga lista</h1>
  <div class="filename" id="fname">—</div>
  <div class="status" id="status">Haz clic para guardar el PDF con el nombre correcto.</div>
  <div class="bar-wrap"><div class="bar" id="bar"></div></div>

  <a id="dlBtn" class="btn" href="#" target="_blank">⬇ Descargar PDF</a>

  <div class="note">
    Si el navegador abre el PDF en lugar de descargarlo,<br>
    usa <strong>Archivo → Guardar como…</strong> y ponle el nombre correcto.
  </div>
</div>

<script>
  const params  = new URLSearchParams(location.search);
  const pdfUrl  = params.get('url')  || '';
  const pdfName = params.get('name') || 'documento.pdf';

  document.getElementById('fname').textContent = pdfName;

  const btn = document.getElementById('dlBtn');

  if (pdfUrl) {
    // Intenta descarga directa con fetch (funciona si no hay CORS)
    async function intentarFetch() {
      try {
        document.getElementById('status').textContent = 'Preparando archivo…';
        document.getElementById('bar').style.width = '40%';

        const resp = await fetch(pdfUrl, { redirect: 'follow' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);

        document.getElementById('bar').style.width = '80%';
        const blob = await resp.blob();

        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = pdfName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);

        document.getElementById('bar').style.width = '100%';
        document.getElementById('status').textContent = '✅ ¡Descarga iniciada!';
        btn.textContent = '⬇ Descargar de nuevo';
        btn.href = pdfUrl;

      } catch (e) {
        // Si fetch falla por CORS, cae al botón manual
        document.getElementById('bar').style.width = '0%';
        document.getElementById('status').textContent = 'Haz clic en el botón para descargar.';
      }
    }

    intentarFetch();

    // El botón siempre funciona como respaldo
    btn.href = pdfUrl;
    btn.setAttribute('download', pdfName);

  } else {
    document.getElementById('status').textContent = 'No se proporcionó URL.';
    btn.style.display = 'none';
  }
</script>
</body>
</html>
